<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="p01261036baseStyle.css">
</head>

<body>
<header>
    <img src="p01261036_logo.png" alt="Logo" class="logo">

    <nav>
        <a href="p01261036index.html">Página Inicial</a>
        <a href="p01261036teste.html">Experimente a Ferramenta</a>
    </nav>

    <div class="acoes">
        <a href="p01261036cadastro.html" class="btn secundario">Cadastrar</a>
    </div>
</header>

<main>
<div class="card">

    <h2>Login</h2>

    <div class="input-group">
        <label>Email SPTech</label>
        <input placeholder="Seu e-mail SPTech" type="email" id="input_email">
    </div>

    <div class="input-group">
        <label>Senha</label>
        <input placeholder="Senha" type="password" id="input_senha">
    </div>

    <button onclick="entrar()">Entrar</button>

    <div id="div_mensagem"></div>

</div>
</main>

<footer>
    <p>Feito por um aluno SPTech, para outros alunos SPTech</p>
    <p>jefferson.watabe@sptech.school</p>
</footer>
</body>
</html>

<script>

function entrar() {
    let email = input_email.value;
    let senha = input_senha.value;
    let mensagem = "";

    if (
        email == "" ||
        senha == ""
    ) {

        mensagem = "Preencha todos os campos.";

        div_mensagem.innerHTML = mensagem;

        return;
    }

    let emailSptech = email.endsWith("@sptech.school");

    if (!emailSptech) {

        mensagem = "Utilize um e-mail institucional SPTech.";

        div_mensagem.innerHTML = mensagem;

        return;
    }

    if (senha.length < 8) {

        mensagem = "Senha inválida.";

        div_mensagem.innerHTML = mensagem;

        return;
    }

    mensagem = "Login realizado com sucesso.";

    div_mensagem.innerHTML = mensagem;

    window.location = "dashboard.html";
}

</script>
