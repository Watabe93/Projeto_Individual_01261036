        alert('Digite um valor entre 1 e 100');

    }

    div_mensagem.innerHTML += `

        Playlist sugerida:<br><br>

    for (let i = 0; i < nivel; i++) {
        div_mensagem.innerHTML += listaTeste[i] + "<br>";
    }
}
